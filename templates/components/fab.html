<!-- Contenedor del Menú de Accesibilidad -->
<div class="a11y-container">
    
    <!-- El Menú Flotante (Oculto por defecto) -->
    <div id="a11y-menu" class="a11y-menu">
        <h4>Accesibilidad</h4>
        
        <div class="a11y-option">
            <span>Contraste (Tema)</span>
            <button type="button" id="btn-theme-toggle" class="a11y-action-btn">🌙 / ☀️</button>
        </div>
        
        <div class="a11y-option">
            <span>Tamaño de texto</span>
            <div class="btn-group">
                <button type="button" id="btn-text-decrease" class="a11y-action-btn">A-</button>
                <button type="button" id="btn-text-increase" class="a11y-action-btn">A+</button>
            </div>
        </div>

        <div class="a11y-option">
            <span>Fuente Legible</span>
            <button type="button" id="btn-font-toggle" class="a11y-action-btn">Aa</button>
        </div>

        <div class="a11y-option">
            <span>Lector de Voz</span>
            <button type="button" id="btn-voice-toggle" class="a11y-action-btn">🔊</button>
        </div>
    </div>

    <!-- El FAB Principal -->
    <button type="button" id="a11y-fab" class="fab-btn" aria-label="Abrir Menú de Accesibilidad">
        <!-- Ícono Universal de Accesibilidad (SVG) -->
        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="4" r="2"></circle>
            <path d="m18 8-6-2-6 2"></path>
            <path d="M12 8v8"></path>
            <path d="m9 22 3-6 3 6"></path>
        </svg>
    </button>
</div>

<!-- Vinculamos el script -->
<script src="{{ url_for('static', filename='js/theme.js') }}?v=2"></script>
